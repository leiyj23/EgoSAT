timechat_online_7b_full_sft:
  type: local
  adapter: benchmark_val/llms/timechat_online_7b_adapter.py
  default_model_id: wyccccc/TimeChatOnline-7B
  required_env:
    - TIMECHAT_REPO_ROOT
    - TIMECHAT_FT_DIR
  notes: "Set TIMECHAT_FT_DIR to a full SFT LoRA adapter directory. Public shell wrappers are not fully wired for this entry yet."

roi_timechat_online_7b_full_sft:
  type: local
  adapter: benchmark_val/llms/roi_timechat_online_7b_adapter.py
  default_model_id: wyccccc/TimeChatOnline-7B
  required_env:
    - TIMECHAT_REPO_ROOT
    - TIMECHAT_FT_DIR
    - ROI_CACHE_ROOT
  notes: "Requires full ROI cache hosted separately. Public shell wrappers are not fully wired for this entry yet."
